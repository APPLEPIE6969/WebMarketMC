name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint server.js

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Start server
        run: |
          REGISTRATION_SECRET="test-secret" node server.js &
          SERVER_PID=$!
          for i in $(seq 1 10); do
            if curl -sf http://localhost:3000/ > /dev/null 2>&1; then
              echo "Server ready"
              break
            fi
            sleep 1
          done

      - name: Test registration
        run: |
          curl -sf -X POST http://localhost:3000/api/register \
            -H "Content-Type: application/json" \
            -d '{"serverId":"test-server","serverName":"Test Server"}' | jq -e '.apiKey'

      - name: Test sync endpoint
        run: |
          curl -sf -X POST http://localhost:3000/api/sync \
            -H "Content-Type: application/json" \
            -H "x-api-key: test-key" \
            -d '{"categories":[],"items":[],"auctions":[],"orders":[],"stocks":[],"priceHistory":{}}' | jq -e '.ok'

      - name: Test session creation
        run: |
          curl -sf -X POST http://localhost:3000/api/session \
            -H "Content-Type: application/json" \
            -d '{"serverId":"test-server","playerUuid":"123e4567-e89b-12d3-a456-426614174000","playerName":"TestPlayer"}' | jq -e '.sessionToken'

      - name: Test session update
        run: |
          curl -sf -X POST http://localhost:3000/api/session-update \
            -H "Content-Type: application/json" \
            -d '{"serverId":"test-server","playerUuid":"123e4567-e89b-12d3-a456-426614174000","balances":{"Aurels":500}}' | jq -e '.ok'

      - name: Test purchase creation (buy)
        run: |
          curl -sf -X POST http://localhost:3000/api/purchase \
            -H "Content-Type: application/json" \
            -d '{"sessionToken":"test-token","type":"buy","itemKey":"DIAMOND","amount":10,"totalCost":100}' | jq -e '.ok'

      - name: Test purchase creation (bid)
        run: |
          curl -sf -X POST http://localhost:3000/api/purchase \
            -H "Content-Type: application/json" \
            -d '{"sessionToken":"test-token","type":"bid","auctionId":1,"amount":50}' | jq -e '.ok'

      - name: Test purchase creation (fill_order)
        run: |
          curl -sf -X POST http://localhost:3000/api/purchase \
            -H "Content-Type: application/json" \
            -d '{"sessionToken":"test-token","type":"fill_order","orderId":1,"amount":5}' | jq -e '.ok'

      - name: Test invalid bid (non-numeric)
        run: |
          curl -sf -X POST http://localhost:3000/api/purchase \
            -H "Content-Type: application/json" \
            -d '{"sessionToken":"test-token","type":"bid","auctionId":1,"amount":"abc"}' | jq -e '.error'

      - name: Test invalid orderId (non-integer)
        run: |
          curl -sf -X POST http://localhost:3000/api/purchase \
            -H "Content-Type: application/json" \
            -d '{"sessionToken":"test-token","type":"fill_order","orderId":"abc","amount":5}' | jq -e '.error'

      - name: Test get pending purchases (IDOR check)
        run: |
          curl -sf -X GET "http://localhost:3000/api/pending-purchases?serverId=test-server&sessionToken=test-token" | jq -e '.purchases | length == 0'

      - name: Stop server
        if: always()
        run: kill "$SERVER_PID" 2>/dev/null || true

  hashing-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Test SHA256 hashing (one-way, deterministic)
        run: |
          REGISTRATION_SECRET="test-secret" \
          node -e "
            const crypto = require('crypto');
            
            function hashApiKey(key) {
              if (!key) return '';
              return crypto.createHash('sha256').update(String(key)).digest('hex');
            }
            
            function apiKeyMatches(plaintext, stored) {
              if (!plaintext || !stored) return false;
              // No plaintext === stored shortcut — prevents hash replay attacks
              return hashApiKey(plaintext) === stored;
            }
            
            // Test 1: Same input always produces same hash (deterministic)
            const key1 = 'a3f7b2c1d9e8';
            const key2 = 'a3f7b2c1d9e8';
            const hash1 = hashApiKey(key1);
            const hash2 = hashApiKey(key2);
            console.log('Deterministic:', hash1 === hash2);
            if (hash1 !== hash2) { console.error('FAIL: Same key produced different hashes'); process.exit(1); }
            
            // Test 2: Different inputs produce different hashes
            const hash3 = hashApiKey('different-key');
            console.log('Distinct:', hash1 !== hash3);
            if (hash1 === hash3) { console.error('FAIL: Different keys produced same hash'); process.exit(1); }
            
            // Test 3: Hash is not reversible (64 hex chars, no plaintext leakage)
            console.log('Hash length:', hash1.length);
            console.log('Is hex:', /^[0-9a-f]{64}$/.test(hash1));
            if (!/^[0-9a-f]{64}$/.test(hash1)) { console.error('FAIL: Hash is not valid SHA256 hex'); process.exit(1); }
            
            // Test 4: apiKeyMatches only accepts hash match (not plaintext === stored)
            console.log('Reject plaintext-as-stored:', !apiKeyMatches('a3f7b2c1d9e8', 'a3f7b2c1d9e8'));
            if (apiKeyMatches('a3f7b2c1d9e8', 'a3f7b2c1d9e8')) { console.error('FAIL: plaintext should not match plaintext'); process.exit(1); }
            
            console.log('Match hash:', apiKeyMatches('a3f7b2c1d9e8', hash1));
            if (!apiKeyMatches('a3f7b2c1d9e8', hash1)) { console.error('FAIL: hash match failed'); process.exit(1); }
            
            console.log('Reject mismatch:', !apiKeyMatches('wrong-key', hash1));
            if (apiKeyMatches('wrong-key', hash1)) { console.error('FAIL: wrong key matched'); process.exit(1); }
            
            // Test 5: Hash replay attack — sending a stored hash as x-api-key must NOT authenticate
            console.log('Reject hash replay:', !apiKeyMatches(hash1, hash1));
            if (apiKeyMatches(hash1, hash1)) { console.error('FAIL: hash replay accepted'); process.exit(1); }
            
            // Test 6: No ENCRYPTION_KEY needed — hashing only uses SHA256 built-in
            console.log('No env var needed: true');
            
            console.log('All hashing tests passed!');
          "

      - name: Test server starts without ENCRYPTION_KEY
        run: |
          REGISTRATION_SECRET="test-secret" node server.js &
          SERVER_PID=$!
          for i in $(seq 1 10); do
            if curl -sf http://localhost:3000/ > /dev/null 2>&1; then
              echo "Server started without ENCRYPTION_KEY — OK"
              kill $SERVER_PID
              exit 0
            fi
            sleep 1
          done
          echo "FAIL: Server did not start"
          kill $SERVER_PID
          exit 1

