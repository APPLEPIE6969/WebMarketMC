name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Node.js Server Test
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: node --check server.js

      - name: Start server (in-memory mode, no Astra)
        run: |
          PORT=3000 REGISTRATION_SECRET="test-secret" node server.js &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> $GITHUB_ENV

      - name: Wait for server to start
        run: |
          for i in $(seq 1 10); do
            if curl -sf http://localhost:3000/ > /dev/null 2>&1; then
              echo "Server is up"
              exit 0
            fi
            sleep 1
          done
          echo "Server failed to start"
          exit 1

      - name: Test landing page
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/)
          [ "$STATUS" = "200" ] || { echo "Landing page returned $STATUS"; exit 1; }

      - name: Test register (no secret = 403)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://localhost:3000/api/register \
            -H "Content-Type: application/json" \
            -d '{"serverId":"test","apiKey":"test"}')
          [ "$STATUS" = "403" ] || { echo "Register without secret returned $STATUS (expected 403)"; exit 1; }

      - name: Test register (with secret = 200)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://localhost:3000/api/register \
            -H "Content-Type: application/json" \
            -H "x-registration-secret: test-secret" \
            -d '{"serverId":"ci-test-server","apiKey":"ci-test-key","serverName":"CI Test Server"}')
          [ "$STATUS" = "200" ] || { echo "Register with secret returned $STATUS (expected 200)"; exit 1; }

      - name: Test sync (wrong key = 403)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://localhost:3000/api/sync \
            -H "Content-Type: application/json" \
            -H "x-api-key: wrong-key" \
            -d '{"serverId":"ci-test-server"}')
          [ "$STATUS" = "403" ] || { echo "Sync with wrong key returned $STATUS (expected 403)"; exit 1; }

      - name: Test sync (correct key = 200)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://localhost:3000/api/sync \
            -H "Content-Type: application/json" \
            -H "x-api-key: ci-test-key" \
            -d '{"serverId":"ci-test-server","categories":[{"id":"blocks","name":"Blocks","icon":"stone","itemCount":1}],"items":{"blocks":[{"key":"stone","name":"Stone","price":10}]}}')
          [ "$STATUS" = "200" ] || { echo "Sync with correct key returned $STATUS (expected 200)"; exit 1; }

      - name: Test session (correct key = 200)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://localhost:3000/api/session \
            -H "Content-Type: application/json" \
            -H "x-api-key: ci-test-key" \
            -d '{"serverId":"ci-test-server","token":"ci-session-token","playerUuid":"00000000-0000-0000-0000-000000000001","playerName":"TestPlayer","balances":{"Aurels":1000}}')
          [ "$STATUS" = "200" ] || { echo "Session create returned $STATUS (expected 200)"; exit 1; }

      - name: Test player endpoint (with session = 200)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/api/ci-test-server/player \
            -H "Authorization: Bearer ci-session-token")
          [ "$STATUS" = "200" ] || { echo "Player endpoint returned $STATUS (expected 200)"; exit 1; }

      - name: Test categories (with session = 200)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/api/ci-test-server/categories \
            -H "Authorization: Bearer ci-session-token")
          [ "$STATUS" = "200" ] || { echo "Categories returned $STATUS (expected 200)"; exit 1; }

      - name: Test items (with session = 200)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:3000/api/ci-test-server/items?category=blocks&page=0" \
            -H "Authorization: Bearer ci-session-token")
          [ "$STATUS" = "200" ] || { echo "Items returned $STATUS (expected 200)"; exit 1; }

      - name: Test buy (with session = 200)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://localhost:3000/api/ci-test-server/buy \
            -H "Authorization: Bearer ci-session-token" \
            -H "Content-Type: application/json" \
            -d '{"item":"stone","amount":1}')
          [ "$STATUS" = "200" ] || { echo "Buy returned $STATUS (expected 200)"; exit 1; }

      - name: Test bid (with session = 200)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://localhost:3000/api/ci-test-server/bid \
            -H "Authorization: Bearer ci-session-token" \
            -H "Content-Type: application/json" \
            -d '{"auctionId":1,"amount":50}')
          [ "$STATUS" = "200" ] || { echo "Bid returned $STATUS (expected 200)"; exit 1; }

      - name: Test fill-order (with session = 200)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://localhost:3000/api/ci-test-server/fill-order \
            -H "Authorization: Bearer ci-session-token" \
            -H "Content-Type: application/json" \
            -d '{"orderId":1,"amount":5}')
          [ "$STATUS" = "200" ] || { echo "Fill order returned $STATUS (expected 200)"; exit 1; }

      - name: Test unauthenticated access (no token = 401)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/api/ci-test-server/player)
          [ "$STATUS" = "401" ] || { echo "Unauth player returned $STATUS (expected 401)"; exit 1; }

      - name: Test invalid session (bad token = 401)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/api/ci-test-server/player \
            -H "Authorization: Bearer bad-token")
          [ "$STATUS" = "401" ] || { echo "Bad session returned $STATUS (expected 401)"; exit 1; }

      - name: Kill server
        if: always()
        run: kill $SERVER_PID 2>/dev/null || true

  encryption-test:
    name: Encryption Test
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Start server with encryption key
        run: |
          PORT=3001 REGISTRATION_SECRET="test-secret" ENCRYPTION_KEY="ci-test-encryption-key-32bytes!!" node server.js &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> $GITHUB_ENV

      - name: Wait for server to start
        run: |
          for i in $(seq 1 10); do
            if curl -sf http://localhost:3001/ > /dev/null 2>&1; then
              echo "Server is up with encryption"
              exit 0
            fi
            sleep 1
          done
          echo "Server failed to start"
          exit 1

      - name: Test register with encryption
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://localhost:3001/api/register \
            -H "Content-Type: application/json" \
            -H "x-registration-secret: test-secret" \
            -d '{"serverId":"enc-test-server","apiKey":"enc-test-key","serverName":"Enc Test Server"}')
          [ "$STATUS" = "200" ] || { echo "Register with encryption returned $STATUS"; exit 1; }

      - name: Test session with encryption
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://localhost:3001/api/session \
            -H "Content-Type: application/json" \
            -H "x-api-key: enc-test-key" \
            -d '{"serverId":"enc-test-server","token":"enc-session-token","playerUuid":"11111111-1111-1111-1111-111111111111","playerName":"EncPlayer","balances":{"Aurels":500}}')
          [ "$STATUS" = "200" ] || { echo "Session with encryption returned $STATUS"; exit 1; }

      - name: Test player data roundtrip with encryption
        run: |
          BODY=$(curl -s http://localhost:3001/api/enc-test-server/player \
            -H "Authorization: Bearer enc-session-token")
          echo "Player response: $BODY"
          echo "$BODY" | grep -q "EncPlayer" || { echo "Player name not found in response"; exit 1; }
          echo "$BODY" | grep -q "11111111-1111-1111-1111-111111111111" || { echo "Player UUID not found in response"; exit 1; }

      - name: Test buy with encryption
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://localhost:3001/api/enc-test-server/buy \
            -H "Authorization: Bearer enc-session-token" \
            -H "Content-Type: application/json" \
            -d '{"item":"diamond","amount":5}')
          [ "$STATUS" = "200" ] || { echo "Buy with encryption returned $STATUS"; exit 1; }

      - name: Kill server
        if: always()
        run: kill $SERVER_PID 2>/dev/null || true