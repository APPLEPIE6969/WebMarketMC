name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Start server (memory-only mode)
        run: |
          REGISTRATION_SECRET="test-secret" node server.js &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> $GITHUB_ENV

      - name: Wait for server to start
        run: |
          for i in $(seq 1 10); do
            if curl -sf http://localhost:3000/ > /dev/null 2>&1; then
              echo "Server is up"
              exit 0
            fi
            sleep 1
          done
          echo "Server failed to start"
          exit 1

      - name: Test landing page
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/)
          [ "$STATUS" = "200" ] || { echo "Landing page returned $STATUS (expected 200)"; exit 1; }

      - name: Test register (no secret = 403)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://localhost:3000/api/register \
            -H "Content-Type: application/json" \
            -d '{"serverId":"test","apiKey":"test"}')
          [ "$STATUS" = "403" ] || { echo "Register without secret returned $STATUS (expected 403)"; exit 1; }

      - name: Test register (with secret = 200)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://localhost:3000/api/register \
            -H "Content-Type: application/json" \
            -H "x-registration-secret: test-secret" \
            -d '{"serverId":"ci-test-server","apiKey":"ci-test-key","serverName":"CI Test Server"}')
          [ "$STATUS" = "200" ] || { echo "Register with secret returned $STATUS (expected 200)"; exit 1; }

      - name: Test sync (wrong key = 403)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://localhost:3000/api/sync \
            -H "Content-Type: application/json" \
            -H "x-api-key: wrong-key" \
            -d '{"serverId":"ci-test-server"}')
          [ "$STATUS" = "403" ] || { echo "Sync with wrong key returned $STATUS (expected 403)"; exit 1; }

      - name: Test sync (correct key = 200)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://localhost:3000/api/sync \
            -H "Content-Type: application/json" \
            -H "x-api-key: ci-test-key" \
            -d '{"serverId":"ci-test-server","categories":[{"id":"blocks","name":"Blocks","icon":"stone","itemCount":1}],"items":{"blocks":[{"key":"stone","name":"Stone","price":10}]}}')
          [ "$STATUS" = "200" ] || { echo "Sync with correct key returned $STATUS (expected 200)"; exit 1; }

      - name: Test session (correct key = 200)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://localhost:3000/api/session \
            -H "Content-Type: application/json" \
            -H "x-api-key: ci-test-key" \
            -d '{"serverId":"ci-test-server","token":"ci-session-token","playerUuid":"00000000-0000-0000-0000-000000000001","playerName":"TestPlayer","balances":{"Aurels":1000}}')
          [ "$STATUS" = "200" ] || { echo "Session create returned $STATUS (expected 200)"; exit 1; }

      - name: Test player endpoint (with session = 200)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/api/ci-test-server/player \
            -H "Authorization: Bearer ci-session-token")
          [ "$STATUS" = "200" ] || { echo "Player endpoint returned $STATUS (expected 200)"; exit 1; }

      - name: Test categories (with session = 200)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/api/ci-test-server/categories \
            -H "Authorization: Bearer ci-session-token")
          [ "$STATUS" = "200" ] || { echo "Categories returned $STATUS (expected 200)"; exit 1; }

      - name: Test items (with session = 200)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:3000/api/ci-test-server/items?category=blocks&page=0" \
            -H "Authorization: Bearer ci-session-token")
          [ "$STATUS" = "200" ] || { echo "Items returned $STATUS (expected 200)"; exit 1; }

      - name: Test buy (with session = 200)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://localhost:3000/api/ci-test-server/buy \
            -H "Authorization: Bearer ci-session-token" \
            -H "Content-Type: application/json" \
            -d '{"item":"stone","amount":1}')
          [ "$STATUS" = "200" ] || { echo "Buy returned $STATUS (expected 200)"; exit 1; }

      - name: Test bid validation (non-numeric = 400)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://localhost:3000/api/ci-test-server/bid \
            -H "Authorization: Bearer ci-session-token" \
            -H "Content-Type: application/json" \
            -d '{"auctionId":1,"amount":"abc"}')
          [ "$STATUS" = "400" ] || { echo "Bid with non-numeric amount returned $STATUS (expected 400)"; exit 1; }

      - name: Test fill-order validation (non-integer orderId = 400)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://localhost:3000/api/ci-test-server/fill-order \
            -H "Authorization: Bearer ci-session-token" \
            -H "Content-Type: application/json" \
            -d '{"orderId":"abc","amount":1}')
          [ "$STATUS" = "400" ] || { echo "Fill-order with non-integer orderId returned $STATUS (expected 400)"; exit 1; }

      - name: Stop server
        if: always()
        run: kill $SERVER_PID

  encryption-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Test encryption enabled (with ENCRYPTION_KEY)
        run: |
          ENCRYPTION_KEY="0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef" \
          REGISTRATION_SECRET="test-secret" \
          node -e "
            const crypto = require('crypto');
            const ENCRYPTION_KEY = process.env.ENCRYPTION_KEY;
            const ALGORITHM = 'aes-256-gcm';
            const IV_LENGTH = 12;
            const AUTH_TAG_LENGTH = 16;
            const ENCRYPTION_PREFIX = 'enc:';
            
            function deriveKey(rawKey) {
              if (!rawKey) return null;
              if (/^[0-9a-f]{64}$/i.test(rawKey)) {
                return Buffer.from(rawKey, 'hex');
              }
              return crypto.createHash('sha256').update(rawKey).digest();
            }
            
            const derivedKey = deriveKey(ENCRYPTION_KEY);
            console.log('Key derived:', !!derivedKey);
            
            function encrypt(plaintext) {
              const str = String(plaintext);
              const iv = crypto.randomBytes(IV_LENGTH);
              const cipher = crypto.createCipheriv(ALGORITHM, derivedKey, iv, { authTagLength: AUTH_TAG_LENGTH });
              let encrypted = cipher.update(str, 'utf8', 'base64url');
              encrypted += cipher.final('base64url');
              const authTag = cipher.getAuthTag().toString('base64url');
              const ivB64 = iv.toString('base64url');
              return ENCRYPTION_PREFIX + ivB64 + ':' + encrypted + ':' + authTag;
            }
            
            function decrypt(ciphertext) {
              if (!ciphertext || typeof ciphertext !== 'string' || !ciphertext.startsWith(ENCRYPTION_PREFIX)) {
                return ciphertext;
              }
              const parts = ciphertext.slice(ENCRYPTION_PREFIX.length).split(':');
              if (parts.length !== 3) return ciphertext;
              const [ivB64, encData, authTagB64] = parts;
              const iv = Buffer.from(ivB64, 'base64url');
              const authTag = Buffer.from(authTagB64, 'base64url');
              const decipher = crypto.createDecipheriv(ALGORITHM, derivedKey, iv, { authTagLength: AUTH_TAG_LENGTH });
              decipher.setAuthTag(authTag);
              let decrypted = decipher.update(encData, 'base64url', 'utf8');
              decrypted += decipher.final('utf8');
              return decrypted;
            }
            
            const test = 'hello world';
            const enc = encrypt(test);
            console.log('Encrypted:', enc);
            const dec = decrypt(enc);
            console.log('Decrypted:', dec);
            console.log('Match:', test === dec);
            
            // Test JSON
            const obj = { balances: { Aurels: 1000 }, items: ['a', 'b'] };
            const json = JSON.stringify(obj);
            const encJson = encrypt(json);
            console.log('Encrypted JSON:', encJson);
            const decJson = decrypt(encJson);
            console.log('Decrypted JSON:', decJson);
            console.log('JSON Match:', json === decJson);
          "

      - name: Test plaintext mode (no ENCRYPTION_KEY, no ASTRA_TOKEN)
        run: |
          REGISTRATION_SECRET="test-secret" \
          node -e "
            const crypto = require('crypto');
            const ENCRYPTION_KEY = '';
            const ALGORITHM = 'aes-256-gcm';
            const IV_LENGTH = 12;
            const AUTH_TAG_LENGTH = 16;
            const ENCRYPTION_PREFIX = 'enc:';
            
            function deriveKey(rawKey) {
              if (!rawKey) return null;
              if (/^[0-9a-f]{64}$/i.test(rawKey)) {
                return Buffer.from(rawKey, 'hex');
              }
              return crypto.createHash('sha256').update(rawKey).digest();
            }
            
            const derivedKey = deriveKey(ENCRYPTION_KEY);
            const encryptionEnabled = !!derivedKey;
            console.log('Encryption enabled:', encryptionEnabled);
            
            function encrypt(plaintext) {
              if (!encryptionEnabled || plaintext === null || plaintext === undefined) {
                return plaintext;
              }
              const str = String(plaintext);
              const iv = crypto.randomBytes(IV_LENGTH);
              const cipher = crypto.createCipheriv(ALGORITHM, derivedKey, iv, { authTagLength: AUTH_TAG_LENGTH });
              let encrypted = cipher.update(str, 'utf8', 'base64url');
              encrypted += cipher.final('base64url');
              const authTag = cipher.getAuthTag().toString('base64url');
              const ivB64 = iv.toString('base64url');
              return ENCRYPTION_PREFIX + ivB64 + ':' + encrypted + ':' + authTag;
            }
            
            function decrypt(ciphertext) {
              if (!ciphertext || typeof ciphertext !== 'string' || !ciphertext.startsWith(ENCRYPTION_PREFIX)) {
                return ciphertext;
              }
              if (!encryptionEnabled) {
                return ciphertext;
              }
              const parts = ciphertext.slice(ENCRYPTION_PREFIX.length).split(':');
              if (parts.length !== 3) return ciphertext;
              const [ivB64, encData, authTagB64] = parts;
              const iv = Buffer.from(ivB64, 'base64url');
              const authTag = Buffer.from(authTagB64, 'base64url');
              const decipher = crypto.createDecipheriv(ALGORITHM, derivedKey, iv, { authTagLength: AUTH_TAG_LENGTH });
              decipher.setAuthTag(authTag);
              let decrypted = decipher.update(encData, 'base64url', 'utf8');
              decrypted += decipher.final('utf8');
              return decrypted;
            }
            
            function encryptJson(obj) {
              const json = JSON.stringify(obj ?? {});
              return encryptionEnabled ? encrypt(json) : json;
            }
            
            function decryptJson(ciphertext) {
              if (!ciphertext) return {};
              const decrypted = decrypt(ciphertext);
              if (typeof decrypted !== 'string' || decrypted.startsWith(ENCRYPTION_PREFIX)) {
                try { return JSON.parse(ciphertext); } catch { return {}; }
              }
              try { return JSON.parse(decrypted); } catch { return {}; }
            }
            
            // Test plaintext mode
            const testObj = { balances: { Aurels: 1000 } };
            const enc = encryptJson(testObj);
            console.log('Plaintext mode - encryptJson returns string:', typeof enc === 'string');
            console.log('Plaintext mode - value:', enc);
            const dec = decryptJson(enc);
            console.log('Plaintext mode - decryptJson works:', JSON.stringify(dec) === JSON.stringify(testObj));
          "

